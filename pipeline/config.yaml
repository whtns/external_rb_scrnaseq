## Configuration file for numbat-only workflow
## Important note:
## All paths defined in this configuration file must be either absolute or relative to the
## location of the Snakefile!

##--------------------------------------------------------------------------------------------
## (Optional) Limit which samples to process. Comma-separated list of Run IDs.
## Set to null (or omit) to process all samples found in the cellranger output directory.
##--------------------------------------------------------------------------------------------
# run_samples: SRR13633760

##--------------------------------------------------------------------------------------------
## Path to metadata text file.
## Must contain at least the following columns:
##   Run: sample identifiers (matching cellranger output folder names)
##   num_clone: expected number of clones for numbat initialisation
##   subset_bad_cell_types: (optional) per-sample boolean override
##--------------------------------------------------------------------------------------------
metatsv: ../data/metadata.tsv

##--------------------------------------------------------------------------------------------
## FASTQ input directory.
## Expected structure: <FASTQ>/<sample>/<sample>_S1_L001_R[12]_001.fastq.gz
##--------------------------------------------------------------------------------------------
FASTQ: ../data/FASTQ

##--------------------------------------------------------------------------------------------
## Cell Ranger reference transcriptome (built with cellranger mkref).
##--------------------------------------------------------------------------------------------
cellranger_transcriptome: /project2/cobrinik_1090/Homo_sapiens/cellranger/refdata-gex-GRCh38-2024-A

##--------------------------------------------------------------------------------------------
## Path to the directory containing cellranger outputs.
## Expected structure: <cellranger_output>/<sample>/outs/possorted_genome_bam.bam
##                     <cellranger_output>/<sample>/outs/filtered_feature_bc_matrix/
##--------------------------------------------------------------------------------------------
cellranger_output: ../output/cellranger

##--------------------------------------------------------------------------------------------
## Output directory. Subfolders will be created automatically by the workflow.
##--------------------------------------------------------------------------------------------
output: ../output/

##--------------------------------------------------------------------------------------------
## Numbat subdirectory name (written inside output/)
##--------------------------------------------------------------------------------------------
numbat_sridhar_dirname: numbat_sridhar

##--------------------------------------------------------------------------------------------
## R setup
##--------------------------------------------------------------------------------------------
Rbin: "R"

## Project-local R library searched before system libraries. Set to null to disable.
R_LIBS_USER: ../.rlib

## Per-rule core counts for HPC. Override any value here to tune for your node size.
## Pass --cores <total> to Snakemake; it will not exceed that total across all running jobs.
ncores: 6        # legacy fallback (unused by rules; kept for backwards compat)
cellranger_cores: 32  # Cell Ranger alignment + counting
cellranger_mem_mb: 128000  # Cell Ranger peak memory (120 GB; passed as --localmem)
pileup_cores: 16     # cellsnp-lite pileup — parallelizes over BAM chunks
phase_cores: 16      # Eagle2 phasing — multi-threaded
seurat_cores: 4      # Seurat object construction — mostly serial R
numbat_cores: 8      # Numbat CNV inference — HMM/EM iterations parallelize well

##--------------------------------------------------------------------------------------------
## Numbat allele pileup and phasing inputs
##--------------------------------------------------------------------------------------------
## Genetic map for Eagle2 phasing
gmap: /Eagle_v2.4.1/tables/genetic_map_hg38_withX.txt.gz

## Population SNP VCF (heterozygous SNP positions)
snpvcf: /project2/cobrinik_1090/Homo_sapiens/numbat/genome1K.phase3.SNP_AF5e2.chr1toX.hg38.chrPrefix.vcf.gz

## 1000 Genomes reference panel directory for phasing
paneldir: /project2/cobrinik_1090/Homo_sapiens/numbat/1000G_hg38

##--------------------------------------------------------------------------------------------
## Numbat CNV inference parameters
##--------------------------------------------------------------------------------------------
## Reference expression profile for normal cells
sridhar_ref_path: /project2/cobrinik_1090/Homo_sapiens/numbat/sridhar_ref.rds

## Transition probability for the HMM (lower = stricter CNV calls)
numbat_t: 1e-2

## Prior probability of CNV state transitions in allele HMM (higher = more permissive calls)
# alpha: 1e-3
# more permissive
alpha: 1e-4

## Gamma parameter controlling clone tree prior
gamma: 20

## Maximum allowed entropy for a cell's clone posterior (cells above this are excluded)
max_entropy: 0.7

## Minimum log-likelihood ratio for a CNV event to be reported
min_LLR: 5

## Maximum number of EM iterations
max_iter: 4

## Maximum number of nearest-neighbour iterations
max_nni: 100

## Fraction of cells used per iteration (1 = all cells)
read_prop: 1

## Pseudocount for clone assignment smoothing
tau: 0.3

## Maximum number of cells processed (downsamples if exceeded)
cell_ceiling: 2e4

##--------------------------------------------------------------------------------------------
## Cell type subsetting
## When True, known non-tumour cell types are excluded from the tumour clone analysis
## and used as the normal reference instead.
##--------------------------------------------------------------------------------------------
subset_bad_cell_types_default: true

##--------------------------------------------------------------------------------------------
## Seurat cell type annotation reference
## Used by process_seurat.R to assign cell type labels before numbat runs.
##--------------------------------------------------------------------------------------------
celltype_ref: /project2/cobrinik_1090/Homo_sapiens/numbat/plae_ref.rds

##--------------------------------------------------------------------------------------------
## Memory limit for the numbat rule (in MB). Enforced via ulimit -v.
## Must be <= the --memory flag passed to `docker run`.
##--------------------------------------------------------------------------------------------
numbat_mem_mb: 131072
